[package]
name = "solana-ibc-types"
version.workspace = true
edition.workspace = true
description = "IBC types and utilities for Solana programs"
license.workspace = true
repository.workspace = true
readme = "../../../README.md"
keywords = ["cosmos", "ibc", "solana", "types", "anchor"]
categories = ["cryptography", "blockchain"]

[dependencies]
anchor-lang.workspace = true
solana-sha256-hasher.workspace = true
solana-keccak-hasher.workspace = true
solana-instructions-sysvar.workspace = true
borsh = { version = "=1.5.7", default-features = false }
solana-ibc-constants = { path = "../solana-ibc-constants" }
solana-ibc-proto = { path = "../solana-ibc-proto" }
solana-ibc-macros = { path = "../solana-ibc-macros" }
solana-ibc-gmp-types = { path = "../solana-ibc-gmp-types" }

[features]
solana = []
idl-build = ["anchor-lang/idl-build"]

[dev-dependencies]
bincode.workspace = true
solana-sdk.workspace = true
solana-sdk-ids.workspace = true

[lib]
crate-type = ["cdylib", "lib"]

[lints]
workspace = true
