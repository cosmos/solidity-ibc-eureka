[package]
name = "solana-ibc-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories = ["cryptography::cryptocurrencies", "development-tools"]
description = "Procedural macros for IBC on Solana"
readme = "README.md"

[lib]
proc-macro = true


[dependencies]
proc-macro2 = "1.0"
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
sha2 = "0.10"

[dev-dependencies]
trybuild = ">=1, <1.0.105" # 1.0.105+ pulls toml 0.9 which requires Rust edition 2024, incompatible with Solana platform-tools Cargo 1.84

[lints]
workspace = true
