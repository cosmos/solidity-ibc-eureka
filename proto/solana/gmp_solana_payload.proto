syntax = "proto3";

package solana;

option go_package = "github.com/cosmos/solidity-ibc-eureka/packages/go-proto/solana";

// `GMPSolanaPayload` represents a Solana instruction for cross-chain execution via GMP
//
// Note: The target program ID is specified in `GMPPacketData.receiver`, not here.
// This avoids redundancy and ensures consistency with the IBC packet structure.
message GMPSolanaPayload {
    // ALL accounts that will be accessed during execution
    repeated SolanaAccountMeta accounts = 1;

    // Instruction data
    bytes data = 2;

    // Lamports the relayer should transfer to the GMP PDA before execution.
    // Covers rent for accounts created by the target program.
    // Set to 0 when no account creation is needed (e.g. SPL transfers).
    uint64 prefund_lamports = 3;
}

// `SolanaAccountMeta` represents account metadata for Solana instructions.
//
// Note: `is_signer` indicates whether the account should be a signer at the CPI instruction level.
// PDAs are marked `is_signer=true` even though they don't sign at the transaction level.
message SolanaAccountMeta {
    // Account public key (32 bytes)
    bytes pubkey = 1;

    // Should this account be a signer in the instruction?
    //
    // For PDAs: true (signs via `invoke_signed` during CPI)
    // For regular accounts: false (doesn't sign)
    bool is_signer = 2;

    // Will this account be modified?
    bool is_writable = 3;
}