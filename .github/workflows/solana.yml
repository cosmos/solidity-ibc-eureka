name: solana

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/tendermint-light-client/**'
      - 'packages/proof-api/**'
      - 'programs/solana/**'
      - 'programs/proof-api/**'
      - '.github/workflows/solana.yml'
      - 'justfile'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SOLANA_VERSION: "2.3.13"
  ANCHOR_VERSION: "0.32.1"

jobs:
  build-and-test:
    name: build-and-test-solana
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: solana-${{ env.ANCHOR_VERSION }}
          cache-on-failure: true

      - uses: solana-developers/github-actions/setup-all@v0.2.5
        with:
          anchor_version: ${{ env.ANCHOR_VERSION }}
          solana_version: ${{ env.SOLANA_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Sync Solana localnet keys
        run: just sync-solana-keys localnet

      - name: Build Solana programs
        run: just build-solana-programs

      - name: Build Solana test programs
        run: just build-solana-test-programs

      - name: Run Solana linting
        run: just lint-solana

      - name: Run Solana integration tests
        run: just test-solana-integration
        env:
          RUST_BACKTRACE: 1

      - name: Run Solana unit tests
        run: just test-solana
        env:
          RUST_BACKTRACE: 1
