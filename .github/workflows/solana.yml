name: solana

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/tendermint-light-client/**'
      - 'packages/relayer/**'
      - 'programs/solana/**'
      - 'programs/relayer/**'
      - '.github/workflows/solana.yml'
      - 'justfile'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "2.2.17"
  ANCHOR_VERSION: "0.32.1"

jobs:
  build-and-test:
    name: build-and-test-solana
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-solana-${{ hashFiles('**/Cargo.lock') }}-anchor-${{ env.ANCHOR_VERSION }}
          restore-keys: |
            ${{ runner.os }}-cargo-solana-

      - uses: solana-developers/github-actions/setup-all@v0.2.5
        with:
          anchor_version: ${{ env.ANCHOR_VERSION }}
          solana_version: ${{ env.SOLANA_VERSION }}

      # Re-setup Rust after Solana setup (which overrides with older bundled version)
      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Rust stable (default for builds)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      # Hide Solana's bundled cargo so system cargo (1.93+) is always used
      # Solana's cargo 1.84 doesn't support edition 2024 required by some deps
      - name: Use system Cargo for edition 2024 support
        run: |
          SOLANA_CARGO=$(find ~/.local/share/solana -name "cargo" -type f 2>/dev/null | head -1)
          if [ -n "$SOLANA_CARGO" ]; then
            echo "Hiding Solana's bundled cargo: $SOLANA_CARGO"
            mv "$SOLANA_CARGO" "${SOLANA_CARGO}.bak"
          fi
          echo "System cargo version:"
          cargo --version

      - name: Build Solana programs
        run: just build-solana
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Run Solana unit tests
        run: just test-solana
        env:
          RUST_BACKTRACE: 1
          RUSTUP_TOOLCHAIN: stable

      # Exclude test programs
      - name: Run coverage
        run: |
          EXCLUDE='programs/(dummy-ibc-app'
          EXCLUDE+='|gmp-counter-app'
          EXCLUDE+='|malicious-caller'
          EXCLUDE+='|mock-ibc-app'
          EXCLUDE+='|mock-light-client)/'
          cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-filename-regex "$EXCLUDE"
        working-directory: programs/solana
        env:
          RUSTUP_TOOLCHAIN: stable

      - uses: codecov/codecov-action@v5
        with:
          files: programs/solana/lcov.info
          flags: solana
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run Solana linting
        run: just lint-solana
        env:
          RUSTUP_TOOLCHAIN: stable

