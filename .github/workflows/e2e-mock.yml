name: e2e-mock
on:
  workflow_dispatch:
    inputs:
      ibc-go-docker-tag:
        description: 'ibc-go Docker image tag'
        type: string
        required: false
        default: 'v11.0.0'
  pull_request:
    paths:
      - 'justfile'
      - '**.rs'
      - '**.go'
      - '**.toml'
      - '**.lock'
      - '**.mod'
      - '**.sum'
      - '**.sol'
      - '.github/workflows/e2e-mock.yml'
      - '.github/actions/**'
      - 'bun.lockb'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci
  SP1_PROVER: mock
  E2E_PROOF_TYPE: groth16
  SP1_VERSION: "6.1.0"
  SOLANA_VERSION: "2.3.13"
  ANCHOR_VERSION: "0.32.1"
  E2E_IBC_GO_DOCKER_TAG: ${{ inputs.ibc-go-docker-tag || 'v11.0.0' }}

permissions:
  contents: read
  packages: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.9
          cache-dependency-path: e2e/interchaintestv8/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: e2e/interchaintestv8

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Generate Test Matrix
        id: get-matrix
        uses: ./.github/actions/e2e-matrix
        with:
          skip-tests: TestWithProofAPITestSuite/Test_2_ConcurrentRecvPacketToEth,TestWithProofAPITestSuite/Test_MultiPeriodClientUpdateToCosmos,TestWithProofAPITestSuite/Test_5_FinalizedTimeoutPacketFromEth,TestWithProofAPITestSuite/Test_UpdateClientToCosmos,TestWithEthToEthAttestedTestSuite,TestWithMultiAttestorTestSuite

  build-e2e-programs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build E2E artifacts
        uses: ./.github/actions/e2e-build
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Compile the large interchaintestv8 test binary once here (uploaded as its
      # own artifact) so each matrix shard runs it directly instead of recompiling.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.9
          cache-dependency-path: e2e/interchaintestv8/go.sum
      - name: Compile e2e test binary
        run: |
          mkdir -p e2e-test-binary
          cd e2e/interchaintestv8
          go test -mod=readonly -c -o "$GITHUB_WORKSPACE/e2e-test-binary/e2e.test" .
      - name: Upload e2e test binary
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-binary
          path: e2e-test-binary/
          retention-days: 1

  e2e:
    needs: [generate-matrix, build-e2e-programs]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    name: ${{ matrix.entrypoint }}/${{ matrix.test }}
    env:
        ETH_TESTNET_TYPE: anvil
        ETH_LC_ON_COSMOS: dummy
        COSMOS_LC_ON_ETH: sp1
        IBC_ATTESTOR_IMAGE: ghcr.io/cosmos/ibc-attestor:v0.3.0

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up E2E environment
        uses: ./.github/actions/e2e-setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download e2e test binary
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-binary
          path: e2e-test-binary/

      - name: Run Tests
        env:
          NETWORK_PRIVATE_KEY: ${{ secrets.SP1_PRIVATE_KEY }}
        run: |
          # Run the test binary precompiled in build-e2e-programs instead of
          # recompiling per shard (download-artifact doesn't preserve +x).
          chmod +x e2e-test-binary/e2e.test
          cd e2e/interchaintestv8
          "$GITHUB_WORKSPACE/e2e-test-binary/e2e.test" -test.v -test.run "^${{ matrix.entrypoint }}$/${{ matrix.test }}$" -test.timeout 40m
