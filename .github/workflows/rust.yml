# Based on https://github.com/actions-rs/example/blob/master/.github/workflows/quickstart.yml
name: rust
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**.rs'
      - '**.toml'
      - '**.lock'
      - '**.proto'
      - 'ibc-solidity/abi/**'
      - '.github/workflows/rust.yml'

jobs:
  lints:
    name: fmt-and-clippy
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy

  tests:
    name: unit-tests
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Install just
        uses: extractions/setup-just@v3
      - name: Run unit tests
        run: just test-cargo
        env:
          RUST_BACKTRACE: 1

  build-proof-api:
    name: build-proof-api
    runs-on: depot-ubuntu-24.04-4
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup
      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --bin proof-api --release --locked

  build-operator:
    name: build-operator
    runs-on: depot-ubuntu-24.04-4
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup
      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --bin operator --release --locked
