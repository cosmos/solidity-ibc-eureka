name: foundry

env:
  API_KEY_ALCHEMY: ${{ secrets.API_KEY_ALCHEMY }}
  ETH_RPC_URL: https://ethereum-rpc.publicnode.com
  FOUNDRY_PROFILE: ci

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Lint the code
        run: bun run lint:sol

      - uses: srdtrk/natlint@main
        with:
          include: 'contracts/**/*.sol'

      - name: Add lint summary
        run: |
          echo "## Lint result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

  build:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Build the contracts and print their size
        run: forge build --sizes

      - name: Add build summary
        run: |
          echo "## Build result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

  test:
    needs: [lint, build]
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Check out CometBFT fixture dependency
        run: |
          expected_cometbft_sha="53171bf261ee80504c9faac62fe06451aca75773"
          if [ ! -d ../cometbft/.git ]; then
            git init ../cometbft
            git -C ../cometbft remote add origin https://github.com/cometbft/cometbft
            git -C ../cometbft fetch --depth 1 origin "$expected_cometbft_sha"
            git -C ../cometbft checkout --detach "$expected_cometbft_sha"
          fi
          actual_cometbft_sha="$(git -C ../cometbft rev-parse HEAD)"
          if [ "$actual_cometbft_sha" != "$expected_cometbft_sha" ]; then
            echo "expected ../cometbft at $expected_cometbft_sha, got $actual_cometbft_sha" >&2
            exit 1
          fi

      - name: Show the Foundry config
        run: forge config

      - name: Check native CometBFT fixtures
        run: just check-cometbft-fixtures

      - name: Generate a fuzz seed that changes weekly to avoid burning through RPC allowance
        run: >
          echo "FOUNDRY_FUZZ_SEED=$(
            echo $(($EPOCHSECONDS - $EPOCHSECONDS % 604800))
          )" >> $GITHUB_ENV

      - name: Limit the fuzz runs to 5000
        run: echo "FOUNDRY_FUZZ_RUNS=5000" >> $GITHUB_ENV

      - name: Run the tests
        run: forge test

      - name: Add test summary
        run: |
          echo "## Tests result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY

  security:
    needs: [build]
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Install Python and Slither
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install slither-analyzer

      - name: Run Slither analysis
        run: slither . --config-file .slither.config.json

      - name: Add security summary
        run: |
          echo "## Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "✅ Slither analysis passed" >> $GITHUB_STEP_SUMMARY

  coverage:
    needs: [test]
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v5
      - name: Set up environment
        uses: ./.github/actions/foundry-setup

      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Generate a fuzz seed that changes weekly to avoid burning through RPC allowance
        run: >
          echo "FOUNDRY_FUZZ_SEED=$(
            echo $(($EPOCHSECONDS - $EPOCHSECONDS % 604800))
          )" >> $GITHUB_ENV

      - name: Limit the fuzz runs to 5000
        run: echo "FOUNDRY_FUZZ_RUNS=5000" >> $GITHUB_ENV

      - name: Run coverage
        run: forge coverage --report lcov

      - name: Remove the test directory from the coverage report
        run: lcov --remove lcov.info "test/**" "scripts/**" -o lcov.info

      - uses: codecov/codecov-action@v5
        with:
          exclude: test
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
