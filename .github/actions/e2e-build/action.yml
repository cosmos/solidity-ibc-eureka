name: e2e-build

inputs:
  github_token:
    description: A Github PAT
    required: true
  build-solana:
    description: Whether to build Solana programs
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up foundry tooling
      uses: ./.github/actions/foundry-setup
      with:
        rust-cache: 'true'
        rust-cache-key: e2e-build

    - name: Cache SP1 Toolchain
      id: cache-sp1-toolchain
      uses: actions/cache@v4
      with:
        path: |
          ~/.sp1
          ~/.rustup/toolchains/succinct
        key: ${{ runner.os }}-sp1-toolchain-${{ env.SP1_VERSION }}

    - name: Install SP1 toolchain
      if: steps.cache-sp1-toolchain.outputs.cache-hit != 'true'
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version ${{ env.SP1_VERSION }} --token ${{ inputs.github_token }}

    - name: Cache SP1 Programs
      id: cache-sp1-programs
      uses: actions/cache@v4
      with:
        path: programs/sp1-programs/target/elf-compilation/riscv64im-succinct-zkvm-elf/release/*
        key: ${{ runner.os }}-sp1-programs-${{ hashFiles('programs/sp1-programs/**', 'Cargo.lock') }}

    - name: Install just
      if: steps.cache-sp1-programs.outputs.cache-hit != 'true'
      uses: extractions/setup-just@v2

    - name: Build SP1 Programs
      if: steps.cache-sp1-programs.outputs.cache-hit != 'true'
      shell: bash
      run: just build-sp1-programs

    # Build proof-api and operator in a single cargo invocation so their shared
    # dependency graph is compiled once. The combined cache key is the union of
    # both binaries' inputs; a hit skips the entire ~20 min compilation pass.
    - name: Cache Rust binaries (proof-api + operator)
      id: cache-bins
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/proof-api
          ~/.cargo/bin/operator
        key: ${{ runner.os }}-e2e-bins-${{ hashFiles('programs/proof-api/**', 'programs/operator/**', 'packages/**', 'abi/bytecode/**', 'Cargo.lock') }}

    - name: Build proof-api and operator
      if: steps.cache-bins.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cargo build --bin proof-api --bin operator --release --locked
        cp target/release/proof-api ~/.cargo/bin/proof-api
        cp target/release/operator ~/.cargo/bin/operator

    - name: Cache Solana Programs
      id: cache-solana
      if: inputs.build-solana == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/solana/
          ~/.local/share/solana/
          ~/.avm/
          ./programs/solana/target/deploy/
          ./programs/solana/target/sbpf-solana-solana/
        key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('programs/solana/**') }}

    - name: Setup Solana and Anchor
      if: inputs.build-solana == 'true' && steps.cache-solana.outputs.cache-hit != 'true'
      uses: solana-developers/github-actions/setup-all@v0.2.5
      with:
        anchor_version: ${{ env.ANCHOR_VERSION }}
        solana_version: ${{ env.SOLANA_VERSION }}

    - name: Install just for Solana build
      if: inputs.build-solana == 'true' && steps.cache-solana.outputs.cache-hit != 'true'
      uses: extractions/setup-just@v2

    - name: Build Solana Programs
      if: inputs.build-solana == 'true' && steps.cache-solana.outputs.cache-hit != 'true'
      shell: bash
      run: just build-solana-programs

    - name: Package artifacts
      shell: bash
      run: |
        mkdir -p e2e-artifacts/bin
        mkdir -p e2e-artifacts/sp1-programs
        cp ~/.cargo/bin/proof-api e2e-artifacts/bin/
        cp ~/.cargo/bin/operator e2e-artifacts/bin/
        cp -r programs/sp1-programs/target/elf-compilation/riscv64im-succinct-zkvm-elf/release/* e2e-artifacts/sp1-programs/

    - name: Package Solana artifacts
      if: inputs.build-solana == 'true'
      shell: bash
      run: |
        mkdir -p e2e-artifacts/solana-programs
        cp -r programs/solana/target/deploy/* e2e-artifacts/solana-programs/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: e2e-build-artifacts
        path: e2e-artifacts/
        retention-days: 1
