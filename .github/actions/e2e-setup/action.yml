name: e2e-setup
description: Sets up the E2E test environment

inputs:
  github_token:
    description: A Github PAT
    required: true
  setup-solana:
    description: Install the Solana/Anchor toolchain. Only needed for Solana test suites; skip it for Eth/Cosmos-only shards to save setup time.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Login to GHCR
      uses: nick-fields/retry@v3
      env:
          GH_TOKEN: ${{ inputs.github_token }}
      with:
        timeout_minutes: 1
        max_attempts: 5
        retry_wait_seconds: 5
        command: docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "$GH_TOKEN"

    - name: Cache wfchain Docker image
      id: cache-wfchain
      uses: actions/cache@v4
      with:
        path: /tmp/wfchain.tar
        key: wfchain-${{ runner.os }}-v0.2.0

    - name: Load wfchain Docker image
      if: steps.cache-wfchain.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i /tmp/wfchain.tar

    - name: Pull and cache wfchain Docker image
      if: steps.cache-wfchain.outputs.cache-hit != 'true'
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: |
          docker pull ghcr.io/cosmos/wfchain:v0.2.0
          docker save ghcr.io/cosmos/wfchain:v0.2.0 -o /tmp/wfchain.tar

    - name: Set up foundry tooling
      uses: ./.github/actions/foundry-setup
      with:
        # Test shards run prebuilt proof-api/operator binaries and never invoke cargo,
        # so skip the unused Rust toolchain install.
        rust: 'false'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.25
        check-latest: true
        cache-dependency-path: e2e/interchaintestv8/go.sum

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: e2e-build-artifacts
        path: e2e-artifacts/

    - name: Cache Solana
      id: cache-solana
      if: inputs.setup-solana == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/solana/
          ~/.local/share/solana/
          ~/.cargo/bin/anchor
          ./programs/solana/target/deploy/
          ./programs/solana/target/sbpf-solana-solana/
        key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('programs/solana/**') }}

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install artifacts
      shell: bash
      run: |
        # Install binaries
        chmod +x e2e-artifacts/bin/*
        mkdir -p ~/.cargo/bin
        cp e2e-artifacts/bin/* ~/.cargo/bin/
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

        # Install SP1 programs
        mkdir -p programs/sp1-programs/target/elf-compilation/riscv64im-succinct-zkvm-elf/release/
        cp -r e2e-artifacts/sp1-programs/* programs/sp1-programs/target/elf-compilation/riscv64im-succinct-zkvm-elf/release/

        # Install Solana programs
        mkdir -p programs/solana/target/deploy/
        cp -r e2e-artifacts/solana-programs/* programs/solana/target/deploy/

    - name: Cache Kurtosis binary
      id: cache-kurtosis
      if: contains(fromJSON('["pos", "optimism", "arbitrum", "cosmos"]'), env.ETH_TESTNET_TYPE)
      uses: actions/cache@v4
      with:
        path: /usr/bin/kurtosis
        key: kurtosis-${{ runner.os }}-1.15.2

    - name: Setup Kurtosis APT repository
      if: contains(fromJSON('["pos", "optimism", "arbitrum", "cosmos"]'), env.ETH_TESTNET_TYPE) && steps.cache-kurtosis.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list

    # Must match the kurtosis library version we use in the e2e tests
    - name: Install Kurtosis
      if: contains(fromJSON('["pos", "optimism", "arbitrum", "cosmos"]'), env.ETH_TESTNET_TYPE) && steps.cache-kurtosis.outputs.cache-hit != 'true'
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: |
          sudo apt update
          sudo apt install -y kurtosis-cli=1.15.2

    - name: Start Kurtosis
      if: contains(fromJSON('["pos", "optimism", "arbitrum", "cosmos"]'), env.ETH_TESTNET_TYPE)
      shell: bash
      run: |
        kurtosis engine start
        kurtosis analytics disable
        echo "$(dirname $(which kurtosis))" >> $GITHUB_PATH

    - name: Setup Solana
      if: inputs.setup-solana == 'true'
      uses: solana-developers/github-actions/setup-all@v0.2.5
      with:
        solana_version: ${{ env.SOLANA_VERSION }}

    - name: Cache attestor Docker image
      id: cache-attestor
      uses: actions/cache@v4
      with:
        path: /tmp/ibc-attestor.tar
        key: ibc-attestor-${{ runner.os }}-${{ env.IBC_ATTESTOR_IMAGE }}

    - name: Load attestor Docker image
      if: steps.cache-attestor.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i /tmp/ibc-attestor.tar

    - name: Pull and cache attestor Docker image
      if: steps.cache-attestor.outputs.cache-hit != 'true'
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: |
          docker pull ${IBC_ATTESTOR_IMAGE:-ghcr.io/cosmos/ibc-attestor:v0.3.0}
          docker save ${IBC_ATTESTOR_IMAGE:-ghcr.io/cosmos/ibc-attestor:v0.3.0} -o /tmp/ibc-attestor.tar
