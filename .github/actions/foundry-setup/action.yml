name: foundry-setup
description: Install the common toolchain (Rust, Foundry, Bun, protoc) used across CI jobs.

inputs:
  rust:
    description: Install the Rust toolchain. Set to 'false' for jobs that only run prebuilt binaries (e.g. e2e test shards) to skip the unused toolchain install.
    required: false
    default: 'true'
  rust-cache:
    description: Enable Swatinem/rust-cache for jobs that compile Rust
    required: false
    default: 'false'
  rust-cache-key:
    description: Extra key to segment the Rust cache per job
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Rust
      if: inputs.rust == 'true'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "1.96.0"
        components: rustfmt, clippy
    - name: Cache Rust build artifacts
      if: inputs.rust == 'true' && inputs.rust-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.rust-cache-key }}
        cache-on-failure: true
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        cache: true
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
    - name: Install the Node.js dependencies
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: bun install
    - name: Setup Protoc
      uses: taiki-e/install-action@protoc
