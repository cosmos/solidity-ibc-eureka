name: foundry-setup

inputs:
  rust-cache:
    description: Enable Swatinem/rust-cache for jobs that compile Rust
    required: false
    default: 'false'
  rust-cache-key:
    description: Extra key to segment the Rust cache per job
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - name: Cache Rust build artifacts
      if: inputs.rust-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.rust-cache-key }}
        cache-on-failure: true
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        cache: true
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
    - name: Install the Node.js dependencies
      uses: nick-invision/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        retry_wait_seconds: 5
        command: bun install
    - name: Setup Protoc
      uses: taiki-e/install-action@protoc
