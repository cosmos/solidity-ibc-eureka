[package]
name = "proof-api-eth-to-eth"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
alloy = { workspace = true, features = ["full", "node-bindings", "reqwest-rustls-tls"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
proof-api-core = { workspace = true }
proof-api-lib = { workspace = true }
ibc-eureka-solidity-types = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
reqwest_0_13 = { package = "reqwest", version = "0.13", default-features = false, features = ["rustls"] }
rustls-pemfile = "2.2"
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread"] }
tokio-rustls = "0.26"
