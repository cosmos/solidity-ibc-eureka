[package]
name                 = "proof-api-eth-to-solana"
version.workspace    = true
edition.workspace    = true
repository.workspace = true
license.workspace    = true

[dependencies]
proof-api-core          = { workspace = true, default-features = false }
proof-api-lib.workspace = true
ibc-eureka-utils.workspace       = true
ibc-eureka-solidity-types        = { workspace = true, features = ["rpc"] }

serde                = { workspace = true, features = ["derive"] }
serde_json.workspace = true

tonic   = { workspace = true, default-features = true }
anyhow  = { workspace = true, features = ["std"] }
tracing = { workspace = true, default-features = true }

# EVM dependencies
alloy = { workspace = true, features = ["full", "node-bindings", "reqwest-rustls-tls"] }

# Solana dependencies
solana-client.workspace             = true
solana-sdk.workspace                = true
solana-transaction-status.workspace = true
bincode.workspace                   = true
sha2.workspace                      = true
anchor-lang.workspace               = true
borsh.workspace                     = true

ibc-proto-eureka.workspace      = true
prost.workspace                 = true
solana-ibc-sdk                      = { path = "../../../../programs/solana/packages/solana-ibc-sdk" }
solana-ibc-gmp-types                = { path = "../../../../programs/solana/packages/solana-ibc-gmp-types" }
solana-ibc-constants                = { path = "../../../../programs/solana/packages/solana-ibc-constants" }
solana-ibc-proto                    = { path = "../../../../programs/solana/packages/solana-ibc-proto" }

# SPL Token dependencies
spl-token                    = "8.0"
spl-associated-token-account = "7.0"

[dev-dependencies]
reqwest_0_13 = { package = "reqwest", version = "0.13", default-features = false, features = ["rustls"] }
rustls-pemfile = "2.2"
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread"] }
tokio-rustls = "0.26"
