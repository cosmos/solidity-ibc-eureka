[package]
name = "proof-api-solana-to-eth"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
proof-api-core = { workspace = true, default-features = false }
proof-api-lib = { workspace = true, features = ["solana"] }

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

tonic = { workspace = true, default-features = true }
anyhow = { workspace = true, features = ["std"] }
tracing = { workspace = true, default-features = true }

alloy = { workspace = true, features = ["full", "node-bindings", "reqwest-rustls-tls"] }

# Solana specific dependencies
solana-sdk.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
