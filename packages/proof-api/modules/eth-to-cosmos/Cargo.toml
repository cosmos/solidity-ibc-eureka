[package]
name       = "proof-api-eth-to-cosmos"
version    = { workspace = true }
edition    = { workspace = true }
repository = { workspace = true }
license    = { workspace = true }

[dependencies]
proof-api-lib    = { workspace = true, default-features = false }
proof-api-core   = { workspace = true, default-features = false }
ibc-eureka-solidity-types = { workspace = true, features = ["rpc"] }
ibc-eureka-utils          = { workspace = true }

ibc-proto-eureka = { workspace = true }

ethereum-apis = { workspace = true }
ethereum-light-client = { workspace = true }
ethereum-types = { workspace = true }

serde      = { workspace = true, features = ["derive"] }
prost      = { workspace = true, features = ["std"] }
serde_json = { workspace = true }

tonic         = { workspace = true, default-features = true }
async-trait   = { workspace = true }
anyhow        = { workspace = true, features = ["std"] }
tracing       = { workspace = true, default-features = true }

tendermint     = { workspace = true, features = ["std"] }
tendermint-rpc = { workspace = true, features = ["http-client"] }

alloy = { workspace = true, features = ["full", "node-bindings", "reqwest-rustls-tls"] }

[dev-dependencies]
reqwest_0_13 = { package = "reqwest", version = "0.13", default-features = false, features = ["rustls"] }
rustls-pemfile = "2.2"
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread"] }
tokio-rustls = "0.26"
