[package]
name       = "proof-api-eth-to-cosmos"
version    = { workspace = true }
edition    = { workspace = true }
repository = { workspace = true }
license    = { workspace = true }

[features]
# Opt-in, manual-only validation harness (mechanism B / local-verify) that pulls the
# deployed cw-ics08-wasm-eth-v1.3.0 `ethereum-light-client` crate at its release tag and
# runs its `verify_header` against headers produced by this crate's eth->cosmos builder.
# OFF by default so normal builds/CI never fetch the git dependency. See
# `tests/live_v1_3_0_acceptance.rs`.
live-verify-v1_3_0 = ["dep:ethereum-light-client-v1_3_0"]

[dependencies]
proof-api-lib    = { workspace = true, default-features = false }
proof-api-core   = { workspace = true, default-features = false }
ibc-eureka-solidity-types = { workspace = true, features = ["rpc"] }
ibc-eureka-utils          = { workspace = true }

ibc-proto-eureka = { workspace = true }

ethereum-apis = { workspace = true }
ethereum-light-client = { workspace = true }
ethereum-types = { workspace = true }

# Optional: only enabled by the `live-verify-v1_3_0` feature for the manual harness.
ethereum-light-client-v1_3_0 = { workspace = true, features = ["test-utils"], optional = true }

serde      = { workspace = true, features = ["derive"] }
prost      = { workspace = true, features = ["std"] }
serde_json = { workspace = true }

tonic         = { workspace = true, default-features = true }
async-trait   = { workspace = true }
anyhow        = { workspace = true, features = ["std"] }
tracing       = { workspace = true, default-features = true }

tendermint     = { workspace = true, features = ["std"] }
tendermint-rpc = { workspace = true, features = ["http-client"] }

alloy = { workspace = true, features = ["full", "node-bindings", "reqwest-rustls-tls"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
